<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Phone Input</title>
    <style>
        :root {
            --bg-color: #212121;
            --accent-color: #4db6ac;
            --text-main: #e0e0e0;
            --text-secondary: #9e9e9e;
            --button-disabled: #333333;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            /* Height 100dvh handles mobile browser toolbars better */
            height: 100dvh; 
        }

        .container {
            width: 100%;
            /* Max-width for desktop, full width for mobile */
            max-width: 500px;
            padding: 32px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h2 {
            color: var(--text-main);
            font-size: 1.2rem;
            font-weight: 400;
            margin: 0;
        }

        .menu-dots {
            color: var(--text-secondary);
            font-size: 22px;
            cursor: pointer;
        }

        .input-wrapper {
            width: 100%;
        }

        /* Using type="text" with inputmode="tel" to allow '+' while triggering numeric keypad */
        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--accent-color);
            color: var(--text-main);
            font-size: 1.4rem;
            padding: 8px 0;
            outline: none;
            letter-spacing: 1px;
        }

        .counter {
            text-align: right;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            margin-top: auto; /* Pushes buttons to bottom on small screens if needed */
            padding-top: 50px;
            gap: 15px;
        }

        button {
            background: transparent;
            border: none;
            padding: 12px 18px;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .btn-cancel {
            color: var(--accent-color);
        }

        .btn-ok {
            background-color: var(--button-disabled);
            color: #555555;
            min-width: 80px;
        }

        .btn-ok.active {
            color: var(--text-main);
            background-color: #424242;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-row">
            <h2>Enter phone no.</h2>
            <div class="menu-dots">⋮</div>
        </div>

        <div class="input-wrapper">
            <input 
                type="text" 
                id="phoneInput" 
                inputmode="tel" 
                placeholder="" 
                autocomplete="off"
            >
            <div class="counter"><span id="curr">0</span>/<span id="total">10</span></div>
        </div>

        <div class="actions">
            <button class="btn-cancel">CANCEL</button>
            <button class="btn-ok" id="okBtn">OK</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('phoneInput');
        const currLabel = document.getElementById('curr');
        const totalLabel = document.getElementById('total');
        const okBtn = document.getElementById('okBtn');

        input.addEventListener('input', (e) => {
            // 1. Only allow numbers and the plus sign
            let val = e.target.value.replace(/[^\d+]/g, '');
            
            // 2. Logic: If it starts with '+', limit is 13. Otherwise 10.
            let limit = val.startsWith('+') ? 13 : 10;
            
            // 3. Enforce the limit
            if (val.length > limit) {
                val = val.substring(0, limit);
            }

            // Update input and UI
            input.value = val;
            currLabel.textContent = val.length;
            totalLabel.textContent = limit;

            // 4. Toggle Button State
            if (val.length > 0) {
                okBtn.classList.add('active');
            } else {
                okBtn.classList.remove('active');
            }
        });
    </script>

</body>
</html>
