<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Phone Input UI</title>
    <style>
        :root {
            --bg-color: #212121;
            --accent-color: #4db6ac;
            --text-main: #e0e0e0;
            --text-secondary: #9e9e9e;
            --button-disabled: #333333;
        }

        /* Prevent all scrolling on the document level */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: var(--bg-color);
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 32px;
            box-sizing: border-box;
            /* Moves content 4% down from the top */
            margin-top: 4vh; 
            display: flex;
            flex-direction: column;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 45px;
        }

        h2 {
            color: var(--text-main);
            font-size: 1.2rem;
            font-weight: 400;
            margin: 0;
        }

        .menu-dots {
            color: var(--text-secondary);
            font-size: 22px;
            cursor: pointer;
            padding: 0 5px;
        }

        .input-wrapper {
            width: 100%;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--accent-color);
            color: var(--text-main);
            font-size: 1.4rem;
            padding: 8px 0;
            outline: none;
            letter-spacing: 1px;
            border-radius: 0; /* Prevents iOS rounded corners */
        }

        .counter {
            text-align: right;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .actions {
            display: flex;
            justify-content: space-between; 
            margin-top: 40px;
            align-items: center;
        }

        button {
            background: transparent;
            border: none;
            padding: 10px 0;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-cancel {
            color: var(--accent-color);
        }

        .btn-ok {
            background-color: var(--button-disabled);
            color: #555555;
            min-width: 80px;
            border-radius: 2px;
            padding: 10px 16px;
            transition: background 0.2s, color 0.2s;
        }

        .btn-ok.active {
            color: var(--text-main);
            background-color: #424242;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-row">
            <h2>Enter phone no.</h2>
            <div class="menu-dots">⋮</div>
        </div>

        <div class="input-wrapper">
            <input 
                type="text" 
                id="phoneInput" 
                inputmode="tel" 
                placeholder="" 
                autocomplete="off"
                autofocus
            >
            <div class="counter"><span id="curr">0</span>/<span id="total">10</span></div>
        </div>

        <div class="actions">
            <button class="btn-cancel">CANCEL</button>
            <button class="btn-ok" id="okBtn">OK</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('phoneInput');
        const currLabel = document.getElementById('curr');
        const totalLabel = document.getElementById('total');
        const okBtn = document.getElementById('okBtn');

        input.addEventListener('input', (e) => {
            // RegEx: Keep numbers and '+' only
            let val = e.target.value.replace(/[^\d+]/g, '');
            
            // Limit logic: 13 with '+', otherwise 10
            let limit = val.startsWith('+') ? 13 : 10;
            
            if (val.length > limit) {
                val = val.substring(0, limit);
            }

            input.value = val;
            currLabel.textContent = val.length;
            totalLabel.textContent = limit;

            // Activate OK button if there's text
            if (val.length > 0) {
                okBtn.classList.add('active');
            } else {
                okBtn.classList.remove('active');
            }
        });
    </script>

</body>
</html>
