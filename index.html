<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM Tool Kit</title>
    <style>
        :root {
            /* Branding and theme colors */
            --bg-color: #1a1c24;      /* Dark background for the app */
            --text-color: #e2e2e6;    /* Light grey for text readability */
            --card-white: #dcdee1;    /* The plastic body of the SIM card */
            --chip-yellow: #f9b73f;   /* The gold/yellow contact chip of the SIM */
            --gear-color: #9ea2ac;    /* Light grey for the settings gear icon */
            --border-color: rgba(255, 255, 255, 0.1); /* Subtle white border for rows */
            --line-color: rgba(0,0,0,0.12); /* Very faint black for chip details */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Roboto', sans-serif, Arial;
            margin: 0;
            padding: 0;
            user-select: none; /* Prevents text highlighting on mobile for a native feel */
        }

        /* Top navigation bar styling */
        .header {
            background-color: var(--bg-color); 
            padding: 24px 18px 16px 18px;
            font-size: 20px;
            font-weight: 400;
            position: sticky; 
            top: 0;
            z-index: 100; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); /* Very thin separator */
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3); /* Provides depth above the list */
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* The three dots menu button */
        .menu-dots {
            cursor: pointer;
            padding: 5px 10px;
            display: none; /* Only visible in specific menus via JS */
            z-index: 102;
        }

        /* The actual dots inside the menu button */
        .menu-dots div {
            width: 4px;
            height: 4px;
            background-color: var(--text-color);
            border-radius: 50%;
            margin: 3px 0;
        }

        /* Dropdown popup for End Session */
        .dropdown {
            position: fixed; 
            right: 8px;
            top: 15px; /* Aligns with the dots inside the navbar */
            background: #2a2d37;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            display: none;
            z-index: 200;
            min-width: 150px;
        }

        /* Individual options inside the dropdown */
        .dropdown-item {
            padding: 14px 20px;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-color);
        }

        .dropdown-item:active {
            background-color: rgba(255, 255, 255, 0.1); /* Feedback on click */
        }

        /* Shared styling for all list items (SIMs and Menu options) */
        .sim-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color); /* Separator line between items */
            -webkit-tap-highlight-color: transparent;
        }

        /* REMOVES BORDER FROM THE LAST ITEM IN ANY LIST */
        .sim-item:last-child {
            border-bottom: none;
        }

        .sim-item:active { 
            background-color: rgba(255, 255, 255, 0.05); /* Tap effect */
        }

        .label { font-size: 18px; }

        /* SIM ICON: Container and positioning */
        .icon-container {
            position: relative;
            width: 46px; 
            height: 36px; 
            margin-right: 13px;
            display: flex; 
            align-items: center;
        }

        /* SIM ICON: The card body with the cut corner */
        .sim-body {
            position: relative; 
            width: 32px; 
            height: 32px; 
            background-color: var(--card-white);
            clip-path: polygon(0 0, 79% 0, 100% 20%, 100% 100%, 0 100%);
            border-radius: 1px;
            display: flex; 
            flex-direction: column; 
            padding-top: 16px; 
            padding-left: 5px;
        }

        /* SIM ICON: The yellow contact chip */
        .yellow-chip {
            width: 27px; 
            height: 28px; 
            background-color: var(--chip-yellow);
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            overflow: hidden;
        }

        /* SIM ICON: The vertical lines on the chip */
        .v-line-container { width: 100%; height: 10px; display: flex; justify-content: space-evenly; }
        .v-line { width: 0.1px; height: 100%; background-color: var(--line-color); }
        
        /* SIM ICON: The horizontal lines across the chip */
        .line { width: 100%; height: 0.1px; background-color: var(--line-color); }

        /* GEAR ICON: Positioning and layering */
        .gear-box {
            position: absolute; 
            bottom: 0; 
            right: 0; 
            width: 20px; 
            height: 5px;
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        .gear-svg { width: 20px; height: 26px; fill: var(--gear-color); }

        /* GEAR ICON: The center white circle and tiny grey dot */
        .white-circle-overlay { position: absolute; width: 7px; height: 7px; background: #fff; border-radius: 50%; }
        .grey-dot-overlay { position: absolute; width: 2px; height: 2px; background: var(--gear-color); border-radius: 50%; }

    </style>
</head>
<body>

    <div class="header">
        <span id="navTitle">SIM Tool Kit</span>
        <div class="menu-dots" id="menuDots" onclick="toggleDropdown(event)">
            <div></div><div></div><div></div>
        </div>
        <div class="dropdown" id="dropdownMenu">
            <div class="dropdown-item" onclick="resetToSelection()">End session</div>
        </div>
    </div>

    <div id="menuContainer"></div>

    <script>
        const menuContainer = document.getElementById('menuContainer');
        const navTitle = document.getElementById('navTitle');
        const menuDots = document.getElementById('menuDots');
        const dropdown = document.getElementById('dropdownMenu');

        const simIconHtml = `
            <div class="icon-container">
                <div class="sim-body">
                    <div class="yellow-chip">
                        <div class="v-line-container"><div class="v-line"></div><div class="v-line"></div><div class="v-line"></div></div>
                        <div class="line"></div><div class="line"></div>
                        <div class="v-line-container"><div class="v-line"></div><div class="v-line"></div><div class="v-line"></div></div>
                    </div>
                </div>
                <div class="gear-box">
                    <svg class="gear-svg" viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
                    <div class="white-circle-overlay"></div>
                    <div class="grey-dot-overlay"></div>
                </div>
            </div>`;

        // Standard navigation function that also pushes to browser history
        function navigateTo(viewName) {
            history.pushState({ view: viewName }, "");
            renderView(viewName);
        }

        // Listener for the phone's back button / side swipes
        window.onpopstate = function(event) {
            if (event.state && event.state.view) {
                renderView(event.state.view);
            } else {
                renderView('initial');
            }
        };

        // Renders the specific menu content
        function renderView(view) {
            dropdown.style.display = "none";
            switch(view) {
                case 'initial':
                    navTitle.innerText = "SIM Tool Kit";
                    menuDots.style.display = "none";
                    menuContainer.innerHTML = `
                        <div class="sim-item" onclick="navigateTo('selection')">
                            ${simIconHtml}<div class="label">Safaricom 1</div>
                        </div>
                        <div class="sim-item" onclick="navigateTo('selection')">
                            ${simIconHtml}<div class="label">Safaricom 2</div>
                        </div>`;
                    break;
                case 'selection':
                    navTitle.innerText = "Safaricom";
                    menuDots.style.display = "none";
                    menuContainer.innerHTML = `
                        <div class="sim-item" onclick="navigateTo('safPlus')"><div class="label">Safaricom+</div></div>
                        <div class="sim-item" onclick="navigateTo('mpesa')"><div class="label">M-PESA</div></div>`;
                    break;
                case 'safPlus':
                    navTitle.innerText = "Safaricom+";
                    menuDots.style.display = "none";
                    menuContainer.innerHTML = `
                        <div class="sim-item"><div class="label">My Account</div></div>
                        <div class="sim-item"><div class="label">M-Banking Services</div></div>`;
                    break;
                case 'mpesa':
                    navTitle.innerText = "SIM Tool Kit";
                    menuDots.style.display = "block";
                    const opts = ["Send Money", "Withdraw Cash", "Buy Airtime", "Loans and Savings", "Lipa na M-PESA", "My Account"];
                    menuContainer.innerHTML = opts.map(o => `<div class="sim-item"><div class="label">${o}</div></div>`).join('');
                    break;
            }
        }

        // Toggles the visibility of the "End Session" dropdown
        function toggleDropdown(e) {
            e.stopPropagation();
            dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
        }

        // Action for the End Session button
        function resetToSelection() {
            navigateTo('selection');
        }

        // Helper to close dropdown if user clicks on the list instead of the button
        document.addEventListener('click', () => { dropdown.style.display = "none"; });

        // Initialize on page load
        history.replaceState({ view: 'initial' }, "");
        renderView('initial');
    </script>
</body>
</html>
