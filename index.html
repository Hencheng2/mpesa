<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CodeCanvas | Fullscreen Preview & Editor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f0f12;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Monaco', monospace;
      color: #eef2ff;
      padding: 0;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Unified top bar: contains Back, Device toggles, and Hide/Show panel */
    .top-bar {
      background: #1e1e2a;
      padding: 6px 20px;
      border-bottom: 1px solid #2d2d3a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      z-index: 30;
      flex-shrink: 0;
    }
    .left-group {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .back-btn {
      background: #2a2a36;
      border: none;
      color: #cbd5e6;
      font-size: 0.9rem;
      padding: 6px 14px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    .back-btn:hover {
      background: #3e3e4e;
      color: white;
    }
    .device-group {
      display: flex;
      gap: 8px;
      background: #14141c;
      padding: 4px 12px;
      border-radius: 48px;
      align-items: center;
    }
    .device-btn {
      background: #2c2c34;
      border: none;
      padding: 5px 16px;
      border-radius: 32px;
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      color: #b9c3db;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .device-btn.active {
      background: #10b981;
      color: white;
      box-shadow: 0 2px 8px rgba(16,185,129,0.3);
    }
    .toggle-panel-btn {
      background: #2c6eef;
      border: none;
      color: white;
      font-size: 0.85rem;
      padding: 6px 18px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
      white-space: nowrap;
    }
    .toggle-panel-btn:hover {
      background: #1e5ad9;
      transform: scale(1.02);
    }
    .arrow-icon {
      font-size: 1rem;
      transition: transform 0.3s ease;
      display: inline-block;
    }
    .arrow-icon.collapsed {
      transform: rotate(180deg);
    }

    /* PREVIEW AREA — independent scrollable wrapper */
    .preview-scroll-wrapper {
      flex: 1;
      background: #0a0a0c;
      overflow-y: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* ensures scroll reaches full content height */
      padding: 20px;
      position: relative;
    }
    .preview-container {
      background: white;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
      border-radius: 12px;
      transition: all 0.2s cubic-bezier(0.2,0.9,0.4,1.1);
      overflow: auto;   /* inner scroll only if needed, but outer handles main scroll */
      flex-shrink: 0;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
      display: block;
    }

    /* Bottom editor panel (collapsible) */
    .editor-panel {
      background: #14141c;
      border-top: 2px solid #2a2a34;
      display: flex;
      flex-direction: column;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      flex-shrink: 0;
    }
    .editor-panel.collapsed {
      height: 48px !important;
      min-height: 48px !important;
    }
    .panel-drag-handle {
      background: #1e1e28;
      padding: 8px 16px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2d2d3a;
      transition: 0.2s;
    }
    .panel-drag-handle:hover {
      background: #2a2a36;
    }
    .collapse-toggle-icon {
      font-size: 1.2rem;
      transition: transform 0.3s;
      color: #8b8baa;
    }
    .panel-title {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #aaaac9;
    }
    .tabs-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      background: #0c0c12;
      padding: 8px 12px;
      gap: 8px;
      border-bottom: 1px solid #282832;
      overflow-x: auto;
    }
    .tab-item {
      background: #20202a;
      padding: 6px 14px;
      border-radius: 32px;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.1s;
      white-space: nowrap;
    }
    .tab-item.active {
      background: #2c6eef;
      color: white;
      box-shadow: 0 0 0 1px #ffffff30;
    }
    .tab-close {
      background: #3f3f4e;
      border: none;
      color: white;
      border-radius: 40px;
      width: 20px;
      height: 20px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .add-tab-btn {
      background: #2c6eef;
      border: none;
      padding: 6px 14px;
      border-radius: 32px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .page-selector {
      background: #2a2a36;
      border-radius: 24px;
      padding: 4px 12px;
      font-size: 0.8rem;
      border: none;
      color: white;
      margin-left: auto;
    }
    .editors-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 16px;
      flex: 1;
      overflow-y: auto;
      transition: opacity 0.2s;
    }
    .editor-panel.collapsed .editors-grid,
    .editor-panel.collapsed .tabs-header {
      display: none;
    }
    .editor-card {
      background: #0e0e14;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      border: 1px solid #2b2b36;
      overflow: hidden;
    }
    .editor-header {
      background: #1a1a24;
      padding: 8px 12px;
      font-weight: 600;
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 5px;
      border-bottom: 1px solid #2c2c38;
    }
    .action-buttons {
      display: flex;
      gap: 6px;
    }
    .action-btn {
      background: #2b2b38;
      border: none;
      padding: 4px 8px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      color: #d9e2ff;
      transition: 0.1s;
    }
    .action-btn:hover {
      background: #3d3d50;
      transform: translateY(-1px);
    }
    textarea {
      background: #03030a;
      color: #eef2ff;
      border: none;
      padding: 12px;
      font-family: 'Fira Code', 'Monaco', monospace;
      font-size: 0.75rem;
      resize: vertical;
      width: 100%;
      flex: 1;
      min-height: 160px;
      outline: none;
      line-height: 1.4;
    }
    @media (max-width: 768px) {
      .editors-grid { grid-template-columns: repeat(2, 1fr); }
      .top-bar { flex-direction: column; align-items: stretch; }
      .left-group { justify-content: space-between; }
      .device-group { justify-content: center; }
    }
    @media (max-width: 480px) {
      .editors-grid { grid-template-columns: 1fr; }
      .action-btn { padding: 3px 6px; font-size: 0.65rem; }
    }
    button { cursor: pointer; transition: 0.1s; }
    button:active { transform: scale(0.96); }
    ::-webkit-scrollbar { width: 6px; background: #1e1e2a; }
    ::-webkit-scrollbar-thumb { background: #3a3a4a; border-radius: 8px; }
  </style>
</head>
<body>

<!-- Unified Top Bar: back button + device toggles + hide/show panel -->
<div class="top-bar">
  <div class="left-group">
    <button class="back-btn" id="backBtn">← Back to Dashboard</button>
    <div class="device-group">
      <button class="device-btn" data-device="phone">📱 Phone (360x640)</button>
      <button class="device-btn" data-device="tablet">📟 Tablet (768x1024)</button>
      <button class="device-btn active" data-device="laptop">💻 Laptop (1366x768)</button>
    </div>
  </div>
  <button class="toggle-panel-btn" id="togglePanelBtn">
    <span class="arrow-icon" id="arrowIcon">▼</span>
    <span id="toggleText">Hide Code Panel</span>
  </button>
</div>

<!-- Independent scrollable preview wrapper: ensures full page preview scrolls to the end -->
<div class="preview-scroll-wrapper" id="previewScrollWrapper">
  <div class="preview-container" id="previewContainer">
    <iframe id="livePreview" title="Live preview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
  </div>
</div>

<!-- Bottom editor panel (collapsible) -->
<div class="editor-panel" id="editorPanel">
  <div class="panel-drag-handle" id="panelHandle">
    <span class="collapse-toggle-icon" id="handleIcon">▲</span>
    <span class="panel-title">click to collapse panel</span>
  </div>
  <div class="tabs-header" id="tabsHeader">
    <!-- dynamic tabs injected -->
  </div>
  <div class="editors-grid">
    <!-- Base HTML Editor -->
    <div class="editor-card">
      <div class="editor-header"><span>📄 Base HTML (Wrapper)</span>
        <div class="action-buttons">
          <button class="action-btn clear-base">Clear</button>
          <button class="action-btn paste-base">Paste</button>
          <button class="action-btn copy-base">Copy</button>
          <button class="action-btn upload-base">Upload</button>
        </div>
      </div>
      <textarea id="baseHtmlEditor" placeholder="<!-- Empty state: add your base HTML structure here -->"></textarea>
    </div>
    <!-- Active Tab HTML (per page) -->
    <div class="editor-card">
      <div class="editor-header"><span>📑 Page HTML <span id="activeTabName">(home)</span></span>
        <div class="action-buttons">
          <button class="action-btn clear-htmltab">Clear</button>
          <button class="action-btn paste-htmltab">Paste</button>
          <button class="action-btn copy-htmltab">Copy</button>
          <button class="action-btn upload-htmltab">Upload</button>
          <button class="action-btn distinguish-btn" style="background:#2c5e2e;">✨ Distinguish</button>
          <button class="action-btn merge-btn" style="background:#2c5e8c;">🔄 Merge</button>
        </div>
      </div>
      <textarea id="htmlTabEditor" placeholder="<!-- Your page content: HTML elements go here -->"></textarea>
    </div>
    <!-- Global CSS -->
    <div class="editor-card">
      <div class="editor-header"><span>🎨 Global CSS</span>
        <div class="action-buttons">
          <button class="action-btn clear-css">Clear</button>
          <button class="action-btn paste-css">Paste</button>
          <button class="action-btn copy-css">Copy</button>
          <button class="action-btn upload-css">Upload</button>
        </div>
      </div>
      <textarea id="globalCssEditor" placeholder="/* Global styles */"></textarea>
    </div>
    <!-- Global JS -->
    <div class="editor-card">
      <div class="editor-header"><span>⚡ Global JavaScript</span>
        <div class="action-buttons">
          <button class="action-btn clear-js">Clear</button>
          <button class="action-btn paste-js">Paste</button>
          <button class="action-btn copy-js">Copy</button>
          <button class="action-btn upload-js">Upload</button>
        </div>
      </div>
      <textarea id="globalJsEditor" placeholder="// Global JavaScript"></textarea>
    </div>
  </div>
</div>

<script>
  // ---------- DATA MODEL ----------
  let htmlTabs = [];      
  let activeTabId = null;
  let tabCounter = 1;

  // DOM elements
  const baseEditor = document.getElementById('baseHtmlEditor');
  const htmlTabEditor = document.getElementById('htmlTabEditor');
  const globalCssEditor = document.getElementById('globalCssEditor');
  const globalJsEditor = document.getElementById('globalJsEditor');
  const previewFrame = document.getElementById('livePreview');
  const previewContainer = document.getElementById('previewContainer');
  const tabsHeaderDiv = document.getElementById('tabsHeader');
  const activeTabNameSpan = document.getElementById('activeTabName');
  const editorPanel = document.getElementById('editorPanel');
  const togglePanelBtn = document.getElementById('togglePanelBtn');
  const arrowIcon = document.getElementById('arrowIcon');
  const toggleTextSpan = document.getElementById('toggleText');
  const panelHandle = document.getElementById('panelHandle');

  // EMPTY STATE: all editors start empty
  baseEditor.value = '';
  globalCssEditor.value = '';
  globalJsEditor.value = '';

  // Core preview builder (ensures full page content inside iframe)
  function updatePreview() {
    const baseContentRaw = baseEditor.value.trim();
    let baseContent = baseContentRaw === "" ? "<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'></head><body></body></html>" : baseContentRaw;
    const activeTab = htmlTabs.find(t => t.id === activeTabId);
    const pageHtml = activeTab ? activeTab.html : "<div style='padding:20px; font-family:sans-serif;'>✨ No page selected or empty content — start coding!</div>";
    const globalCss = globalCssEditor.value;
    const globalJs = globalJsEditor.value;

    let finalDoc = baseContent;
    let tempDiv = document.createElement('div');
    tempDiv.innerHTML = baseContent;
    let bodyTag = tempDiv.querySelector('body');
    if (bodyTag) {
      bodyTag.innerHTML = pageHtml;
      finalDoc = tempDiv.innerHTML;
    } else {
      if (finalDoc.includes('</body>')) {
        finalDoc = finalDoc.replace('</body>', pageHtml + '</body>');
      } else {
        finalDoc = '<body>' + pageHtml + '</body>' + finalDoc;
      }
    }
    // inject global CSS
    if (globalCss.trim()) {
      const styleTag = `<style data-global-css="true">\n${globalCss}\n</style>`;
      if (finalDoc.toLowerCase().includes('</head>')) {
        finalDoc = finalDoc.replace(/<\/head>/i, styleTag + '\n</head>');
      } else if (finalDoc.toLowerCase().includes('<body')) {
        finalDoc = finalDoc.replace(/<body/i, styleTag + '\n<body');
      } else {
        finalDoc = styleTag + finalDoc;
      }
    }
    // inject global JS
    if (globalJs.trim()) {
      const scriptTag = `<script data-global-js="true">\n${globalJs}\n<\/script>`;
      if (finalDoc.toLowerCase().includes('</body>')) {
        finalDoc = finalDoc.replace(/<\/body>/i, scriptTag + '\n</body>');
      } else {
        finalDoc = finalDoc + scriptTag;
      }
    }
    
    const doc = previewFrame.contentWindow.document;
    doc.open();
    doc.write(finalDoc);
    doc.close();
  }

  function attachAutoUpdates() {
    const elements = [baseEditor, htmlTabEditor, globalCssEditor, globalJsEditor];
    elements.forEach(el => el.addEventListener('input', () => updatePreview()));
  }

  // Device preview + ensures preview container size adapts, and outer scroll handles it.
  function setPreview(device) {
    let width, height;
    if (device === 'phone') { width = 360; height = 640; }
    else if (device === 'tablet') { width = 768; height = 1024; }
    else { width = 1366; height = 768; }
    previewContainer.style.width = `${width}px`;
    previewContainer.style.height = `${height}px`;
    previewContainer.style.maxWidth = '100%';
    // keep aspect / but height auto? we keep fixed height for device feel
    document.querySelectorAll('.device-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.device-btn[data-device="${device}"]`).classList.add('active');
    // optional: tiny delay to ensure iframe re-renders
    setTimeout(() => updatePreview(), 20);
  }

  // UI: update tabs & sync active HTML editor
  function updateTabUI() {
    tabsHeaderDiv.innerHTML = '';
    htmlTabs.forEach(tab => {
      const tabDiv = document.createElement('div');
      tabDiv.className = 'tab-item';
      if (tab.id === activeTabId) tabDiv.classList.add('active');
      tabDiv.innerHTML = `<span>${escapeHtml(tab.name)}</span><button class="tab-close" data-id="${tab.id}">✕</button>`;
      tabDiv.addEventListener('click', (e) => {
        if (e.target.classList.contains('tab-close')) return;
        switchTab(tab.id);
      });
      const closeBtn = tabDiv.querySelector('.tab-close');
      closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        removeHtmlTab(tab.id);
      });
      tabsHeaderDiv.appendChild(tabDiv);
    });
    const addBtn = document.createElement('button');
    addBtn.textContent = '+ New Page';
    addBtn.className = 'add-tab-btn';
    addBtn.onclick = () => addHtmlTab();
    tabsHeaderDiv.appendChild(addBtn);
    
    const selector = document.createElement('select');
    selector.className = 'page-selector';
    htmlTabs.forEach(tab => {
      const option = document.createElement('option');
      option.value = tab.id;
      option.textContent = tab.name;
      if (tab.id === activeTabId) option.selected = true;
      selector.appendChild(option);
    });
    selector.addEventListener('change', (e) => {
      switchTab(parseInt(e.target.value));
    });
    tabsHeaderDiv.appendChild(selector);
    
    const active = htmlTabs.find(t => t.id === activeTabId);
    if (active) {
      htmlTabEditor.value = active.html;
      activeTabNameSpan.innerText = active.name;
    } else {
      htmlTabEditor.value = '';
      activeTabNameSpan.innerText = '(none)';
    }
    updatePreview();
  }

  function switchTab(id) {
    activeTabId = id;
    const active = htmlTabs.find(t => t.id === id);
    if (active) {
      htmlTabEditor.value = active.html;
      activeTabNameSpan.innerText = active.name;
    }
    updateTabUI();
  }

  function addHtmlTab() {
    const newId = ++tabCounter;
    const newName = `page_${newId}`;
    const newHtml = `<div style="padding:20px; font-family:system-ui;"><h2>✨ New page: ${newName}</h2><p>Start editing your content here.</p><div style="margin-top: 40px; background:#f0f0f0; padding:20px;">Scroll test: this content ensures full scrollable preview</div></div>`;
    htmlTabs.push({ id: newId, name: newName, html: newHtml });
    if (activeTabId === null) activeTabId = newId;
    else activeTabId = newId;
    updateTabUI();
  }

  function removeHtmlTab(tabId) {
    if (htmlTabs.length <= 1) {
      alert("Minimum one tab required. Keep at least one HTML page.");
      return;
    }
    const index = htmlTabs.findIndex(t => t.id === tabId);
    if (index !== -1) htmlTabs.splice(index, 1);
    if (activeTabId === tabId) {
      activeTabId = htmlTabs[0]?.id || null;
    }
    updateTabUI();
  }

  function renameTabViaUpload(tabId, file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const content = e.target.result;
      let newName = file.name.replace(/\.html?$/i, '').substring(0, 25);
      const tab = htmlTabs.find(t => t.id === tabId);
      if (tab) {
        tab.name = newName || "uploaded";
        tab.html = content;
        if (activeTabId === tabId) {
          htmlTabEditor.value = content;
          activeTabNameSpan.innerText = tab.name;
        }
        updateTabUI();
        updatePreview();
      }
    };
    reader.readAsText(file);
  }

  // Distinguish: extract <style> and <script> from active HTML
  function distinguishCode() {
    const activeTab = htmlTabs.find(t => t.id === activeTabId);
    if (!activeTab) return;
    let htmlCode = activeTab.html;
    const styleRegex = /<style[^>]*>([\s\S]*?)<\/style>/gi;
    const scriptRegex = /<script[^>]*>([\s\S]*?)<\/script>/gi;
    let extractedCss = '';
    let extractedJs = '';
    htmlCode = htmlCode.replace(styleRegex, (match, p1) => {
      extractedCss += p1 + '\n';
      return '';
    });
    htmlCode = htmlCode.replace(scriptRegex, (match, p1) => {
      extractedJs += p1 + '\n';
      return '';
    });
    activeTab.html = htmlCode.trim();
    if (extractedCss.trim()) {
      globalCssEditor.value = (globalCssEditor.value + '\n' + extractedCss).trim();
    }
    if (extractedJs.trim()) {
      globalJsEditor.value = (globalJsEditor.value + '\n' + extractedJs).trim();
    }
    htmlTabEditor.value = activeTab.html;
    updateTabUI();
    updatePreview();
  }

  function mergeCode() {
    const activeTab = htmlTabs.find(t => t.id === activeTabId);
    if (!activeTab) return;
    let currentHtml = activeTab.html;
    const cssContent = globalCssEditor.value.trim();
    const jsContent = globalJsEditor.value.trim();
    let merged = currentHtml;
    if (cssContent) {
      const styleTag = `<style data-merged="true">\n${cssContent}\n</style>`;
      if (merged.toLowerCase().includes('</head>')) {
        merged = merged.replace(/<\/head>/i, styleTag + '\n</head>');
      } else if (merged.toLowerCase().includes('<body')) {
        merged = merged.replace(/<body/i, styleTag + '\n<body');
      } else {
        merged = styleTag + '\n' + merged;
      }
    }
    if (jsContent) {
      const scriptTag = `<script data-merged="true">\n${jsContent}\n<\/script>`;
      if (merged.toLowerCase().includes('</body>')) {
        merged = merged.replace(/<\/body>/i, scriptTag + '\n</body>');
      } else {
        merged = merged + scriptTag;
      }
    }
    activeTab.html = merged;
    htmlTabEditor.value = activeTab.html;
    globalCssEditor.value = '';
    globalJsEditor.value = '';
    updateTabUI();
    updatePreview();
  }

  async function pasteToTextarea(textarea) {
    try {
      const text = await navigator.clipboard.readText();
      textarea.value = text;
      textarea.dispatchEvent(new Event('input'));
    } catch (err) { alert("Clipboard permission needed"); }
  }
  function copyFromTextarea(textarea) {
    navigator.clipboard.writeText(textarea.value).then(() => alert("Copied!"));
  }
  function uploadToTextarea(textarea, accept = ".txt,.html,.css,.js") {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = accept;
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        textarea.value = ev.target.result;
        textarea.dispatchEvent(new Event('input'));
      };
      reader.readAsText(file);
    };
    input.click();
  }
  function uploadHtmlTabFile() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = ".html,.htm";
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      renameTabViaUpload(activeTabId, file);
    };
    input.click();
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  function bindEditorButtons() {
    document.querySelector('.clear-base').onclick = () => { baseEditor.value = ''; baseEditor.dispatchEvent(new Event('input')); };
    document.querySelector('.paste-base').onclick = () => pasteToTextarea(baseEditor);
    document.querySelector('.copy-base').onclick = () => copyFromTextarea(baseEditor);
    document.querySelector('.upload-base').onclick = () => uploadToTextarea(baseEditor, ".html,.txt");
    document.querySelector('.clear-htmltab').onclick = () => { const t = htmlTabs.find(t=>t.id===activeTabId); if(t){ t.html=''; htmlTabEditor.value=''; updateTabUI(); updatePreview(); } };
    document.querySelector('.paste-htmltab').onclick = () => pasteToTextarea(htmlTabEditor);
    document.querySelector('.copy-htmltab').onclick = () => copyFromTextarea(htmlTabEditor);
    document.querySelector('.upload-htmltab').onclick = () => uploadHtmlTabFile();
    document.querySelector('.distinguish-btn').onclick = () => distinguishCode();
    document.querySelector('.merge-btn').onclick = () => mergeCode();
    document.querySelector('.clear-css').onclick = () => { globalCssEditor.value = ''; updatePreview(); };
    document.querySelector('.paste-css').onclick = () => pasteToTextarea(globalCssEditor);
    document.querySelector('.copy-css').onclick = () => copyFromTextarea(globalCssEditor);
    document.querySelector('.upload-css').onclick = () => uploadToTextarea(globalCssEditor, ".css");
    document.querySelector('.clear-js').onclick = () => { globalJsEditor.value = ''; updatePreview(); };
    document.querySelector('.paste-js').onclick = () => pasteToTextarea(globalJsEditor);
    document.querySelector('.copy-js').onclick = () => copyFromTextarea(globalJsEditor);
    document.querySelector('.upload-js').onclick = () => uploadToTextarea(globalJsEditor, ".js");
  }

  htmlTabEditor.addEventListener('input', () => {
    const active = htmlTabs.find(t => t.id === activeTabId);
    if (active) {
      active.html = htmlTabEditor.value;
      updatePreview();
      updateTabUI();
    }
  });

  let isPanelCollapsed = false;
  function toggleCodePanel() {
    isPanelCollapsed = !isPanelCollapsed;
    if (isPanelCollapsed) {
      editorPanel.classList.add('collapsed');
      arrowIcon.classList.add('collapsed');
      arrowIcon.textContent = '▲';
      toggleTextSpan.textContent = 'Show Code Panel';
      handleIcon.textContent = '▼';
    } else {
      editorPanel.classList.remove('collapsed');
      arrowIcon.classList.remove('collapsed');
      arrowIcon.textContent = '▼';
      toggleTextSpan.textContent = 'Hide Code Panel';
      handleIcon.textContent = '▲';
    }
    setTimeout(() => updatePreview(), 50);
  }
  togglePanelBtn.addEventListener('click', toggleCodePanel);
  panelHandle.addEventListener('click', toggleCodePanel);

  function init() {
    baseEditor.value = '';
    globalCssEditor.value = '';
    globalJsEditor.value = '';
    // One default tab with a taller content to demo scrollability
    htmlTabs.push({ id: 1, name: "home", html: `<div style="padding: 20px; font-family: system-ui; color: #222; max-width:100%;"><h2>🚀 Start Coding</h2><p>Write HTML, CSS, JS in panels below. This preview area is fully scrollable! The top bar stays fixed, preview scrolls independently to show entire page.</p><div style="height: 800px; background: linear-gradient(135deg, #f9f9ff, #e0e7ff); margin-top: 20px; border-radius: 24px; padding: 20px;"><h3>Long content area</h3><p>Scroll inside the preview wrapper to see the bottom of this container. No content hidden behind top bar.</p><button onclick="alert('Works!')" style="padding:10px 20px; margin-top:20px;">Click me</button><div style="margin-top: 40px;"><strong>End of page test</strong> — you can reach this point without obstruction.</div></div></div>` });
    activeTabId = 1;
    tabCounter = 1;
    updateTabUI();
    attachAutoUpdates();
    bindEditorButtons();
    setPreview('laptop');
    updatePreview();
    document.querySelectorAll('.device-btn').forEach(btn => {
      btn.addEventListener('click', (e) => setPreview(btn.dataset.device));
    });
    document.getElementById('backBtn').addEventListener('click', () => alert("Navigation demo — full preview mode ready"));
  }
  init();
</script>
</body>
</html>
