<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIM Tool Kit - Integrated</title>
    <style>
        :root {
            /* Theme 1 Colors */
            --bg-color: #1a1c24;
            --text-color: #e2e2e6;
            --card-white: #dcdee1;
            --chip-yellow: #f9b73f;
            --gear-color: #9ea2ac;
            --border-color: rgba(255, 255, 255, 0.1);
            --line-color: rgba(0,0,0,0.12);
            
            /* Theme 2 Colors */
            --mpesa-bg: #212121;
            --accent-color: #4db6ac;
            --text-main: #e0e0e0;
            --text-secondary: #9e9e9e;
            --button-disabled: #333333;
            --modal-bg: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Roboto', sans-serif, Arial;
            margin: 0;
            padding: 0;
            user-select: none;
            overflow-x: hidden;
        }

        /* --- UI COMPONENTS FROM CODE 1 --- */
        .header {
            background-color: var(--bg-color); 
            padding: 24px 18px 16px 18px;
            font-size: 20px;
            font-weight: 400;
            position: sticky; 
            top: 0;
            z-index: 100; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-dots {
            cursor: pointer;
            padding: 5px 10px;
            z-index: 102;
        }

        .menu-dots div {
            width: 4px;
            height: 4px;
            background-color: var(--text-color);
            border-radius: 50%;
            margin: 3px 0;
        }

        .dropdown {
            position: fixed; 
            right: 8px;
            top: 15px;
            background: #1a1c24;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            display: none;
            z-index: 200;
            min-width: 150px;
        }

        .dropdown-item {
            padding: 14px 20px;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-color);
        }

        .sim-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            -webkit-tap-highlight-color: transparent;
        }

        .sim-item:last-child { border-bottom: none; }
        .sim-item:active { background-color: rgba(255, 255, 255, 0.05); }
        .label { font-size: 18px; }

        /* SIM ICON CSS */
        .icon-container { position: relative; width: 46px; height: 36px; margin-right: 10px; display: flex; align-items: center; }
        .sim-body { position: relative; width: 30px; height: 33px; background-color: var(--card-white); clip-path: polygon(0 0, 79% 0, 100% 20%, 100% 100%, 0 100%); border-radius: 1px; display: flex; flex-direction: column; padding-top: 16px; padding-left: 5px; }
        .yellow-chip { width: 25px; height: 27px; background-color: var(--chip-yellow); display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .v-line-container { width: 100%; height: 10px; display: flex; justify-content: space-evenly; }
        .v-line { width: 0.1px; height: 100%; background-color: var(--line-color); }
        .line { width: 100%; height: 0.1px; background-color: var(--line-color); }
        .gear-box { position: absolute; bottom: 0; right: 0; width: 20px; height: 4px; display: flex; align-items: center; justify-content: center; }
        .gear-svg { width: 24px; height: 26px; fill: var(--gear-color); }
        .white-circle-overlay { position: absolute; width: 7px; height: 7px; background: #fff; border-radius: 50%; }
        .grey-dot-overlay { position: absolute; width: 2px; height: 2px; background: var(--gear-color); border-radius: 50%; }

        /* --- UI COMPONENTS FROM CODE 2 --- */
        .mpesa-container {
            background-color: var(--mpesa-bg);
            min-height: 100vh;
            width: 100%;
            display: none; /* Shown via JS */
            flex-direction: column;
            padding: 20px 32px;
            box-sizing: border-box;
        }

        .mpesa-top-bar { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .mpesa-dots { color: var(--text-secondary); font-size: 24px; cursor: pointer; line-height: 1; }
        .header-row { margin-bottom: 40px; }
        h2 { color: var(--text-main); font-size: 1.1rem; font-weight: 400; margin: 0; }
        
        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--accent-color);
            color: var(--text-main);
            font-size: 1.1rem; 
            padding: 8px 0;
            outline: none;
            letter-spacing: 0.5px;
            border-radius: 0;
        }

        input.pin-mode { letter-spacing: 8px; -webkit-text-security: disc; }
        .counter { text-align: right; color: var(--text-secondary); font-size: 0.75rem; margin-top: 10px; }
        .actions { display: flex; justify-content: space-between; margin-top: 40px; align-items: center; }
        
        button { background: transparent; border: none; padding: 10px 0; font-weight: bold; font-size: 0.85rem; letter-spacing: 0.5px; cursor: pointer; text-transform: uppercase; }
        .btn-cancel { color: var(--accent-color); }
        .btn-ok { background-color: var(--button-disabled); color: #555555; min-width: 80px; border-radius: 2px; padding: 10px 16px; transition: all 0.2s; }
        .btn-ok.active { color: var(--text-main); background-color: #424242; }

        #modalOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-box { background: var(--modal-bg); width: 85%; max-width: 320px; padding: 24px; border-radius: 4px; }
        .modal-title { color: var(--text-main); font-size: 1.2rem; margin-bottom: 15px; font-weight: 500; }
        .modal-body { color: var(--text-secondary); font-size: 0.95rem; line-height: 1.4; margin-bottom: 25px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 20px; }
    </style>
</head>
<body>

    <div id="toolkitWrapper">
        <div class="header">
            <span id="navTitle">SIM Tool Kit</span>
            <div class="menu-dots" id="menuDots" style="display:none;" onclick="toggleDropdown(event)">
                <div></div><div></div><div></div>
            </div>
            <div class="dropdown" id="dropdownMenu">
                <div class="dropdown-item" onclick="resetToSelection()">End session</div>
            </div>
        </div>
        <div id="menuContainer"></div>
    </div>

    <div id="mpesaWrapper" class="mpesa-container">
        <div class="mpesa-top-bar">
            <div class="mpesa-dots" onclick="toggleDropdown(event)">⋮</div>
        </div>

        <div class="header-row">
            <h2 id="mpesaTitle">Enter phone no.</h2>
        </div>

        <div class="input-wrapper">
            <input type="text" id="mainInput" inputmode="tel" autocomplete="off">
            <div class="counter"><span id="curr">0</span>/<span id="total">10</span></div>
        </div>

        <div class="actions">
            <button class="btn-cancel" id="cancelBtn">CANCEL</button>
            <button class="btn-ok" id="okBtn">OK</button>
        </div>
    </div>

    <div id="modalOverlay">
        <div class="modal-box">
            <div class="modal-title">Send Money</div>
            <div class="modal-body" id="modalMsg"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
                <button class="btn-cancel" style="color: var(--text-main)" onclick="location.reload()">OK</button>
            </div>
        </div>
    </div>

    <script>
        const menuContainer = document.getElementById('menuContainer');
        const navTitle = document.getElementById('navTitle');
        const menuDots = document.getElementById('menuDots');
        const dropdown = document.getElementById('dropdownMenu');
        
        const toolkitWrapper = document.getElementById('toolkitWrapper');
        const mpesaWrapper = document.getElementById('mpesaWrapper');
        
        const mTitle = document.getElementById('mpesaTitle');
        const mInput = document.getElementById('mainInput');
        const currLabel = document.getElementById('curr');
        const totalLabel = document.getElementById('total');
        const okBtn = document.getElementById('okBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const modal = document.getElementById('modalOverlay');
        const modalMsg = document.getElementById('modalMsg');

        let mpesaStep = 0;
        let userData = { phone: "", amount: "", pin: "" };
        const mpesaSteps = [
            { title: "Enter phone no.", min: 1, max: 10, type: "phone" },
            { title: "Enter Amount", min: 1, max: 10, type: "number" },
            { title: "Enter M-PESA Pin", min: 4, max: 4, type: "pin" }
        ];

        const simIconHtml = `
            <div class="icon-container">
                <div class="sim-body">
                    <div class="yellow-chip">
                        <div class="v-line-container"><div class="v-line"></div><div class="v-line"></div><div class="v-line"></div></div>
                        <div class="line"></div><div class="line"></div>
                        <div class="v-line-container"><div class="v-line"></div><div class="v-line"></div><div class="v-line"></div></div>
                    </div>
                </div>
                <div class="gear-box">
                    <svg class="gear-svg" viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
                    <div class="white-circle-overlay"></div>
                    <div class="grey-dot-overlay"></div>
                </div>
            </div>`;

        function navigateTo(viewName) {
            history.pushState({ view: viewName }, "");
            renderView(viewName);
        }

        function renderView(view) {
            dropdown.style.display = "none";
            toolkitWrapper.style.display = "block";
            mpesaWrapper.style.display = "none";
            document.body.style.backgroundColor = "var(--bg-color)";

            switch(view) {
                case 'initial':
                    navTitle.innerText = "SIM Tool Kit";
                    menuDots.style.display = "none";
                    menuContainer.innerHTML = `
                        <div class="sim-item" onclick="navigateTo('selection')">
                            ${simIconHtml}<div class="label">Safaricom 1</div>
                        </div>
                        <div class="sim-item" onclick="navigateTo('selection')">
                            ${simIconHtml}<div class="label">Safaricom 2</div>
                        </div>`;
                    break;
                case 'selection':
                    navTitle.innerText = "Safaricom";
                    menuDots.style.display = "none";
                    menuContainer.innerHTML = `
                        <div class="sim-item" onclick="navigateTo('safPlus')"><div class="label">Safaricom+</div></div>
                        <div class="sim-item" onclick="navigateTo('mpesa')"><div class="label">M-PESA</div></div>`;
                    break;
                case 'safPlus':
                    navTitle.innerText = "Safaricom+";
                    menuDots.style.display = "none";
                    menuContainer.innerHTML = `
                        <div class="sim-item"><div class="label">My Account</div></div>
                        <div class="sim-item"><div class="label">M-Banking Services</div></div>`;
                    break;
                case 'mpesa':
                    navTitle.innerText = "SIM Tool Kit";
                    menuDots.style.display = "block";
                    const opts = ["Send Money", "Withdraw Cash", "Buy Airtime", "Loans and Savings", "Lipa na M-PESA", "My Account"];
                    menuContainer.innerHTML = opts.map(o => {
                        let clickAction = o === "Send Money" ? "startMpesaFlow()" : "";
                        return `<div class="sim-item" onclick="${clickAction}"><div class="label">${o}</div></div>`;
                    }).join('');
                    break;
            }
        }

        /* M-PESA LOGIC */
        function startMpesaFlow() {
            mpesaStep = 0;
            history.pushState({ view: 'mpesaFlow', step: 0 }, "");
            showMpesaStep();
        }

        function showMpesaStep() {
            toolkitWrapper.style.display = "none";
            mpesaWrapper.style.display = "flex";
            document.body.style.backgroundColor = "var(--mpesa-bg)";
            
            const current = mpesaSteps[mpesaStep];
            mTitle.textContent = current.title;
            mInput.value = "";
            mInput.className = current.type === "pin" ? "pin-mode" : "";
            
            let limit = (mpesaStep === 0 && mInput.value.startsWith('+')) ? 13 : current.max;
            totalLabel.textContent = limit;
            currLabel.textContent = "0";
            okBtn.classList.remove('active');
            mInput.focus();
        }

        mInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/[^\d+]/g, '');
            const current = mpesaSteps[mpesaStep];
            let limit = (mpesaStep === 0 && val.startsWith('+')) ? 13 : current.max;
            
            if (val.length > limit) val = val.substring(0, limit);
            mInput.value = val;
            currLabel.textContent = val.length;
            totalLabel.textContent = limit;

            if (val.length >= current.min) okBtn.classList.add('active');
            else okBtn.classList.remove('active');
        });

        okBtn.addEventListener('click', () => {
            if (!okBtn.classList.contains('active')) return;

            if (mpesaStep === 0) userData.phone = mInput.value;
            if (mpesaStep === 1) userData.amount = mInput.value;

            if (mpesaStep < mpesaSteps.length - 1) {
                mpesaStep++;
                history.pushState({view: 'mpesaFlow', step: mpesaStep}, "");
                showMpesaStep();
            } else {
                modalMsg.innerHTML = `Send Money to ${userData.phone} KSH ${userData.amount}`;
                modal.style.display = 'flex';
            }
        });

        cancelBtn.addEventListener('click', () => {
            resetToSelection();
        });

        function toggleDropdown(e) {
            e.stopPropagation();
            dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
        }

        function resetToSelection() {
            navigateTo('selection');
        }

        function closeModal() { modal.style.display = 'none'; }

        window.onpopstate = function(event) {
            closeModal();
            if (event.state && event.state.view === 'mpesaFlow') {
                mpesaStep = event.state.step;
                showMpesaStep();
            } else if (event.state && event.state.view) {
                renderView(event.state.view);
            } else {
                renderView('initial');
            }
        };

        document.addEventListener('click', () => { dropdown.style.display = "none"; });

        // Init
        history.replaceState({ view: 'initial' }, "");
        renderView('initial');
    </script>
</body>
</html>
