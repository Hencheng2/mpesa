<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM Tool Kit</title>
    <style>
        :root {
            --bg-color: #1a1c24; 
            --text-color: #e2e2e6;
            --card-white: #dcdee1;   
            --chip-yellow: #f9b73f;  
            --gear-color: #cbced4;  
            --border-color: rgba(255, 255, 255, 0.1); 
            --line-color: rgba(0,0,0,0.12);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Roboto', sans-serif, Arial;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* HEADER */
        .header {
            background-color: var(--bg-color); 
            padding: 24px 18px 16px 18px;
            font-size: 20px;
            font-weight: 400;
            position: sticky; 
            top: 0;
            z-index: 100; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3); 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 3-DOT MENU & DROPDOWN */
        .menu-dots {
            cursor: pointer;
            padding: 5px 10px;
            display: none;
            z-index: 102;
        }
        .menu-dots div {
            width: 4px;
            height: 4px;
            background-color: var(--text-color);
            border-radius: 50%;
            margin: 3px 0;
        }

        .dropdown {
            position: fixed; /* Anchors to viewport */
            right: 8px;
            top: 15px; /* Aligned with the top bar height */
            background: #2a2d37;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            display: none;
            z-index: 200;
            min-width: 150px;
        }

        .dropdown-item {
            padding: 14px 20px;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-color);
        }

        .dropdown-item:active {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* LIST ITEMS */
        .sim-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            -webkit-tap-highlight-color: transparent;
        }
        .sim-item:active { background-color: rgba(255, 255, 255, 0.05); }
        .label { font-size: 18px; }

        /* ICON STYLING */
        .icon-container {
            position: relative;
            width: 52px; height: 44px; margin-right: 12px;
            display: flex; align-items: center;
        }
        .sim-body {
            position: relative; width: 38px; height: 40px; 
            background-color: var(--card-white);
            clip-path: polygon(0 0, 79% 0, 100% 20%, 100% 100%, 0 100%);
            border-radius: 1px;
            display: flex; flex-direction: column; padding-top: 16px; padding-left: 5px;
        }
        .yellow-chip {
            width: 33px; height: 32px; background-color: var(--chip-yellow);
            display: flex; flex-direction: column; justify-content: space-between; overflow: hidden;
        }
        .v-line-container { width: 100%; height: 10px; display: flex; justify-content: space-evenly; }
        .v-line { width: 0.1px; height: 100%; background-color: var(--line-color); }
        .line { width: 100%; height: 0.1px; background-color: var(--line-color); }
        .gear-box {
            position: absolute; bottom: 0; right: 0; width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .gear-svg { width: 20px; height: 20px; fill: var(--gear-color); }
        .white-circle-overlay { position: absolute; width: 7px; height: 7px; background: #fff; border-radius: 50%; }
        .grey-dot-overlay { position: absolute; width: 2px; height: 2px; background: var(--gear-color); border-radius: 50%; }

    </style>
</head>
<body>

    <div class="header">
        <span id="navTitle">SIM Tool Kit</span>
        <div class="menu-dots" id="menuDots" onclick="toggleDropdown(event)">
            <div></div><div></div><div></div>
        </div>
        <div class="dropdown" id="dropdownMenu">
            <div class="dropdown-item" onclick="resetToSelection()">End session</div>
        </div>
    </div>

    <div id="menuContainer"></div>

    <script>
        const menuContainer = document.getElementById('menuContainer');
        const navTitle = document.getElementById('navTitle');
        const menuDots = document.getElementById('menuDots');
        const dropdown = document.getElementById('dropdownMenu');

        const simIconHtml = `
            <div class="icon-container">
                <div class="sim-body">
                    <div class="yellow-chip">
                        <div class="v-line-container"><div class="v-line"></div><div class="v-line"></div><div class="v-line"></div></div>
                        <div class="line"></div><div class="line"></div>
                        <div class="v-line-container"><div class="v-line"></div><div class="v-line"></div><div class="v-line"></div></div>
                    </div>
                </div>
                <div class="gear-box">
                    <svg class="gear-svg" viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
                    <div class="white-circle-overlay"></div>
                    <div class="grey-dot-overlay"></div>
                </div>
            </div>`;

        // Navigation History Logic
        function navigateTo(viewName) {
            history.pushState({ view: viewName }, "");
            renderView(viewName);
        }

        window.onpopstate = function(event) {
            if (event.state && event.state.view) {
                renderView(event.state.view);
            } else {
                renderView('initial');
            }
        };

        function renderView(view) {
            dropdown.style.display = "none";
            switch(view) {
                case 'initial':
                    navTitle.innerText = "SIM Tool Kit";
                    menuDots.style.display = "none";
                    menuContainer.innerHTML = `
                        <div class="sim-item" onclick="navigateTo('selection')">
                            ${simIconHtml}<div class="label">Safaricom 1</div>
                        </div>
                        <div class="sim-item" onclick="navigateTo('selection')">
                            ${simIconHtml}<div class="label">Safaricom 2</div>
                        </div>`;
                    break;
                case 'selection':
                    navTitle.innerText = "Safaricom";
                    menuDots.style.display = "none";
                    menuContainer.innerHTML = `
                        <div class="sim-item" onclick="navigateTo('safPlus')"><div class="label">Safaricom+</div></div>
                        <div class="sim-item" onclick="navigateTo('mpesa')"><div class="label">M-PESA</div></div>`;
                    break;
                case 'safPlus':
                    navTitle.innerText = "Safaricom+";
                    menuDots.style.display = "none";
                    menuContainer.innerHTML = `
                        <div class="sim-item"><div class="label">My Account</div></div>
                        <div class="sim-item"><div class="label">M-Banking Services</div></div>`;
                    break;
                case 'mpesa':
                    navTitle.innerText = "SIM Tool Kit";
                    menuDots.style.display = "block";
                    const opts = ["Send Money", "Withdraw Cash", "Buy Airtime", "Loans and Savings", "Lipa na M-PESA", "My Account"];
                    menuContainer.innerHTML = opts.map(o => `<div class="sim-item"><div class="label">${o}</div></div>`).join('');
                    break;
            }
        }

        function toggleDropdown(e) {
            e.stopPropagation();
            dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
        }

        function resetToSelection() {
            navigateTo('selection');
        }

        // Close dropdown when clicking anywhere else
        document.addEventListener('click', () => { dropdown.style.display = "none"; });

        // Initialize first state
        history.replaceState({ view: 'initial' }, "");
        renderView('initial');
    </script>
</body>
</html>
