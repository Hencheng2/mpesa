<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M-PESA Flow UI</title>
    <style>
        :root {
            --bg-color: #212121;
            --accent-color: #4db6ac;
            --text-main: #e0e0e0;
            --text-secondary: #9e9e9e;
            --button-disabled: #333333;
            --modal-bg: #333333;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: var(--bg-color);
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 32px;
            box-sizing: border-box;
            margin-top: 4vh; 
            display: flex;
            flex-direction: column;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 45px;
        }

        h2 {
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: 400;
            margin: 0;
        }

        .menu-dots {
            color: var(--text-secondary);
            font-size: 22px;
            cursor: pointer;
        }

        /* Reduced font size for user inputs */
        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--accent-color);
            color: var(--text-main);
            font-size: 1.1rem; 
            padding: 8px 0;
            outline: none;
            letter-spacing: 0.5px;
            border-radius: 0;
        }

        input.pin-mode {
            letter-spacing: 8px;
            -webkit-text-security: disc;
        }

        .counter {
            text-align: right;
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-top: 10px;
        }

        .actions {
            display: flex;
            justify-content: space-between; 
            margin-top: 40px;
            align-items: center;
        }

        button {
            background: transparent;
            border: none;
            padding: 10px 0;
            font-weight: bold;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-cancel { color: var(--accent-color); }

        .btn-ok {
            background-color: var(--button-disabled);
            color: #555555;
            min-width: 80px;
            border-radius: 2px;
            padding: 10px 16px;
            transition: all 0.2s;
        }

        .btn-ok.active {
            color: var(--text-main);
            background-color: #424242;
        }

        /* System-style Popup Modal */
        #modalOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-box {
            background: var(--modal-bg);
            width: 85%;
            max-width: 320px;
            padding: 24px;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .modal-title {
            color: var(--text-main);
            font-size: 1.2rem;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .modal-body {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.4;
            margin-bottom: 25px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-row">
            <h2 id="title">Enter phone no.</h2>
            <div class="menu-dots">⋮</div>
        </div>

        <div class="input-wrapper">
            <input type="text" id="mainInput" inputmode="tel" autocomplete="off" autofocus>
            <div class="counter"><span id="curr">0</span>/<span id="total">10</span></div>
        </div>

        <div class="actions">
            <button class="btn-cancel" id="cancelBtn">CANCEL</button>
            <button class="btn-ok" id="okBtn">OK</button>
        </div>
    </div>

    <div id="modalOverlay">
        <div class="modal-box">
            <div class="modal-title">Send Money</div>
            <div class="modal-body" id="modalMsg">
                Send Money to [Number] KSH [Amount]
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
                <button class="btn-cancel" style="color: var(--text-main)" onclick="location.reload()">OK</button>
            </div>
        </div>
    </div>

    <script>
        const title = document.getElementById('title');
        const input = document.getElementById('mainInput');
        const currLabel = document.getElementById('curr');
        const totalLabel = document.getElementById('total');
        const okBtn = document.getElementById('okBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const modal = document.getElementById('modalOverlay');
        const modalMsg = document.getElementById('modalMsg');

        let step = 0; 
        let userData = { phone: "", amount: "", pin: "" };

        const steps = [
            { title: "Enter phone no.", min: 1, max: 10, type: "phone" },
            { title: "Enter Amount", min: 1, max: 10, type: "number" },
            { title: "Enter M-PESA Pin", min: 4, max: 4, type: "pin" }
        ];

        function updateUI() {
            const current = steps[step];
            title.textContent = current.title;
            input.value = (step === 0) ? userData.phone : (step === 1 ? userData.amount : "");
            input.className = current.type === "pin" ? "pin-mode" : "";
            
            let limit = (step === 0 && input.value.startsWith('+')) ? 13 : current.max;
            totalLabel.textContent = limit;
            currLabel.textContent = input.value.length;
            
            toggleOk(input.value.length >= current.min);
            input.focus();
        }

        function toggleOk(active) {
            if(active) okBtn.classList.add('active');
            else okBtn.classList.remove('active');
        }

        input.addEventListener('input', (e) => {
            let val = e.target.value.replace(/[^\d+]/g, '');
            const current = steps[step];
            let limit = (step === 0 && val.startsWith('+')) ? 13 : current.max;
            
            if (val.length > limit) val = val.substring(0, limit);
            input.value = val;
            currLabel.textContent = val.length;
            totalLabel.textContent = limit;
            toggleOk(val.length >= current.min);
        });

        okBtn.addEventListener('click', () => {
            if (!okBtn.classList.contains('active')) return;

            if (step === 0) userData.phone = input.value;
            if (step === 1) userData.amount = input.value;

            if (step < steps.length - 1) {
                step++;
                history.pushState({step: step}, "");
                updateUI();
            } else {
                showFinalPopup();
            }
        });

        function showFinalPopup() {
            modalMsg.innerHTML = `Send Money to ${userData.phone} KSH ${userData.amount}`;
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        window.addEventListener('popstate', (e) => {
            step = (e.state && e.state.step !== undefined) ? e.state.step : 0;
            closeModal();
            updateUI();
        });

        cancelBtn.addEventListener('click', () => {
            if (step > 0) history.back();
        });

        history.replaceState({step: 0}, "");
        updateUI();
    </script>
</body>
</html>
